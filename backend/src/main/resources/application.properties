server.port=8080

# Config MySQL (có thể override bằng biến môi trường khi deploy)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/employee_management?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Tự tạo/cập nhật schema theo entity
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT (đặt JWT_SECRET trên Render / môi trường thật)
jwt.secret=${JWT_SECRET:default-secret-change-in-production-min-32chars!}
jwt.expiration-ms=86400000

# Tài khoản demo (đổi mật khẩu qua biến môi trường khi deploy)
app.seed.enabled=true
app.seed.admin-username=${APP_ADMIN_USERNAME:admin}
app.seed.admin-password=${APP_ADMIN_PASSWORD:Admin@123}
app.seed.user-username=${APP_USER_USERNAME:user}
app.seed.user-password=${APP_USER_PASSWORD:User@123}

